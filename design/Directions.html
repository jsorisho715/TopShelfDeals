<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TopShelf — Direction Explorations</title>
<link rel="preconnect" href="https://api.fontshare.com" />
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; background: #0c0c0e; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data/deals.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="directions/vault.jsx"></script>
<script type="text/babel" src="directions/arcade.jsx"></script>
<script type="text/babel" src="directions/gallery.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function Frame({ children }) {
  // a fixed desktop frame the dashboards render into
  return <div style={{ width: 1320, background: '#07100b' }}>{children}</div>;
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="dir" title="TopShelf · 3 directions" subtitle="Premium top-shelf · dark + gold · 3D depth. Hover the cards — they tilt, lift and refract. Pick one and I'll build it into the full connected web↔Telegram prototype.">
        <DCArtboard id="vault" label="A · The Vault — editorial luxe, gold foil, parallax tilt" width={1320} height={900}>
          <Frame><window.VaultDashboard /></Frame>
        </DCArtboard>
        <DCArtboard id="arcade" label="B · Arcade Score — gamified, extruded type, deal-score rings" width={1320} height={900}>
          <Frame><window.ArcadeDashboard /></Frame>
        </DCArtboard>
        <DCArtboard id="gallery" label="C · Gallery Depth — floating cards, glass refraction, dramatic shadow" width={1320} height={980}>
          <Frame><window.GalleryDashboard /></Frame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
