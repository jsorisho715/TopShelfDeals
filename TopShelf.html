<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TopShelf — Scottsdale Top-Shelf Deals</title>
<link rel="preconnect" href="https://api.fontshare.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: 'Satoshi', sans-serif; color: #f3ede0; -webkit-font-smoothing: antialiased;
    background:
      radial-gradient(130% 90% at 12% -8%, #18371f 0%, #0a160f 42%, #060d09 100%) fixed;
    min-height: 100vh;
  }
  ::selection { background: rgba(212,175,55,.3); }
  /* slim scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* image-slot theming for our dark glass look */
  image-slot.ts-slot::part(frame) { background: transparent; }
  image-slot.ts-slot::part(ring) { border-color: rgba(255,255,255,.22); }
  image-slot.ts-slot { color: rgba(243,237,224,.7); }

  @keyframes tsFade { from { opacity: 1; } to { opacity: 1; } }
  @keyframes tsRise { from { transform: translateY(22px) scale(.985); } to { transform: none; } }
  @keyframes tsPop { 0% { transform: scale(.6); } 60% { transform: scale(1.08); } 100% { transform: scale(1); } }

  /* responsive collapses */
  @media (max-width: 860px) {
    .ts-dash-grid { grid-template-columns: 1fr !important; }
    .ts-detail-grid { grid-template-columns: 1fr !important; }
    .ts-detail-grid > div:first-child { min-height: 240px !important; }
    .ts-tg-aside { display: none !important; }
  }

  /* allowlist modal goes full-screen on phones */
  @media (max-width: 480px) {
    .ts-allow-overlay { padding: 0 !important; align-items: stretch !important; }
    .ts-allow-card {
      max-width: 100% !important; width: 100% !important; height: 100% !important;
      border-radius: 0 !important; max-height: 100% !important;
    }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="TopShelf/app/image-slot.js"></script>
<script type="text/babel" src="TopShelf/app/shared.jsx"></script>
<script type="text/babel" src="TopShelf/app/dashboard.jsx"></script>
<script type="text/babel" src="TopShelf/app/detail.jsx"></script>
<script type="text/babel" src="TopShelf/app/telegram.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function SavingsCounter() {
  const v = window.useCountUp(1284, 1600);
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 11, padding: '8px 14px', borderRadius: 13,
      background: 'linear-gradient(135deg, rgba(212,175,55,.14), rgba(212,175,55,.04))', border: '1px solid rgba(212,175,55,.3)' }}>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e8c662" strokeWidth="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      <div style={{ lineHeight: 1 }}>
        <div style={{ fontSize: 9.5, color: '#bca35e', letterSpacing: '.12em', textTransform: 'uppercase', whiteSpace: 'nowrap' }}>Saved this month</div>
        <div style={{ fontFamily: 'Clash Display', fontWeight: 700, fontSize: 21, color: '#f1dd9e' }}>${v.toLocaleString()}</div>
      </div>
      <span style={{ fontSize: 11, color: '#5effa0', fontWeight: 700, alignSelf: 'flex-start', marginTop: 2 }}>▲18%</span>
    </div>
  );
}

function AllowlistModal({ onClose }) {
  const [owner, setOwner] = useState(null);
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [chatId, setChatId] = useState('');
  const [label, setLabel] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState(null);

  useEffect(() => {
    let alive = true;
    Promise.all([
      fetch('/api/users/owner').then(r => r.json()),
      fetch('/api/users').then(r => r.json()),
    ]).then(([o, u]) => {
      if (!alive) return;
      setOwner(o); setUsers(Array.isArray(u) ? u : []);
    }).catch(() => { if (alive) setErr('Could not load the allowlist.'); })
      .finally(() => { if (alive) setLoading(false); });
    return () => { alive = false; };
  }, []);

  const add = () => {
    const cid = chatId.trim();
    if (!cid) { setErr('Enter a chat ID first.'); return; }
    setBusy(true); setErr(null);
    fetch('/api/users', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: cid, label: label.trim() }),
    }).then(async r => {
      const j = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(j.detail || 'Could not add that user.');
      return j;
    }).then(u => { setUsers(list => [...list, u]); setChatId(''); setLabel(''); })
      .catch(e => setErr(e.message))
      .finally(() => setBusy(false));
  };

  const toggleActive = (u) => {
    setErr(null);
    fetch(`/api/users/${u.id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ active: !u.active }),
    }).then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(updated => setUsers(list => list.map(x => x.id === u.id ? updated : x)))
      .catch(() => setErr('Could not update that user.'));
  };

  const remove = (u) => {
    setErr(null);
    fetch(`/api/users/${u.id}`, { method: 'DELETE' })
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(() => setUsers(list => list.filter(x => x.id !== u.id)))
      .catch(() => setErr('Could not remove that user.'));
  };

  const field = {
    flex: 1, minWidth: 0, padding: '11px 13px', borderRadius: 11, fontSize: 14, fontFamily: 'Satoshi',
    background: 'rgba(0,0,0,.32)', border: '1px solid rgba(255,255,255,.12)', color: '#f3ede0', outline: 'none',
  };

  return (
    <div className="ts-allow-overlay" onClick={onClose} style={{ position: 'fixed', inset: 0, zIndex: 250,
      display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20,
      background: 'rgba(4,9,6,.72)', backdropFilter: 'blur(7px)', animation: 'tsFade .2s' }}>
      <div className="ts-allow-card" onClick={e => e.stopPropagation()} style={{ width: '100%', maxWidth: 480, maxHeight: '88vh',
        display: 'flex', flexDirection: 'column', borderRadius: 20, overflow: 'hidden',
        background: 'linear-gradient(180deg, rgba(18,32,23,.98), rgba(10,20,14,.98))',
        border: '1px solid rgba(212,175,55,.22)', boxShadow: '0 30px 80px -20px rgba(0,0,0,.85)', animation: 'tsRise .3s cubic-bezier(.2,.8,.2,1)' }}>

        {/* header */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '18px 20px', borderBottom: '1px solid rgba(255,255,255,.07)' }}>
          <span style={{ width: 34, height: 34, borderRadius: 10, background: 'linear-gradient(135deg,#e8c662,#b8902e)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#0a1610' }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          </span>
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: 'Clash Display', fontWeight: 600, fontSize: 18, lineHeight: 1 }}>Bot allowlist</div>
            <div style={{ fontSize: 11.5, color: '#7e9384', marginTop: 4 }}>Who can message @TopShelfLucaBot</div>
          </div>
          <button onClick={onClose} aria-label="Close" style={{ width: 34, height: 34, borderRadius: 9, border: '1px solid rgba(255,255,255,.12)', background: 'transparent', color: '#cbd8cc', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>

        {/* body (scrolls) */}
        <div style={{ padding: 20, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 14 }}>
          {/* owner row */}
          <div>
            <div style={{ fontSize: 10.5, color: '#bca35e', letterSpacing: '.12em', textTransform: 'uppercase', marginBottom: 8 }}>You (owner)</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 11, padding: '12px 14px', borderRadius: 13,
              background: 'linear-gradient(135deg, rgba(212,175,55,.13), rgba(212,175,55,.03))', border: '1px solid rgba(212,175,55,.3)' }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: '#f1dd9e' }}>Owner</div>
                <div style={{ fontFamily: 'JetBrains Mono', fontSize: 12, color: '#9fb0a2', marginTop: 2, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                  {owner && owner.chat_id ? owner.chat_id : 'TELEGRAM_CHAT_ID not set in .env'}
                </div>
              </div>
              <span style={{ fontSize: 10.5, fontWeight: 700, color: '#0a1610', background: 'linear-gradient(135deg,#e8c662,#b8902e)', padding: '4px 9px', borderRadius: 7 }}>OWNER</span>
            </div>
          </div>

          {/* allowlisted users */}
          <div>
            <div style={{ fontSize: 10.5, color: '#7e9384', letterSpacing: '.12em', textTransform: 'uppercase', marginBottom: 8 }}>Allowed users</div>
            {loading ? (
              <div style={{ fontSize: 13, color: '#7e9384', padding: '8px 2px' }}>Loading…</div>
            ) : users.length === 0 ? (
              <div style={{ fontSize: 13, color: '#7e9384', padding: '12px 14px', borderRadius: 12, border: '1px dashed rgba(255,255,255,.12)' }}>
                No one else yet. Add a chat ID below to let a friend use the bot.
              </div>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {users.map(u => (
                  <div key={u.id} style={{ display: 'flex', alignItems: 'center', gap: 11, padding: '11px 13px', borderRadius: 12,
                    background: 'rgba(0,0,0,.28)', border: '1px solid rgba(255,255,255,.08)', opacity: u.active ? 1 : 0.55 }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 14, fontWeight: 600, color: '#eaf2eb', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{u.label || 'Unnamed'}</div>
                      <div style={{ fontFamily: 'JetBrains Mono', fontSize: 12, color: '#9fb0a2', marginTop: 2 }}>{u.chat_id}</div>
                    </div>
                    <button onClick={() => toggleActive(u)} title={u.active ? 'Active — tap to pause' : 'Paused — tap to enable'} style={{
                      fontSize: 11, fontWeight: 700, cursor: 'pointer', padding: '5px 10px', borderRadius: 8, fontFamily: 'Satoshi',
                      border: u.active ? '1px solid rgba(94,255,160,.4)' : '1px solid rgba(255,255,255,.15)',
                      background: u.active ? 'rgba(94,255,160,.12)' : 'transparent', color: u.active ? '#5effa0' : '#9fb0a2' }}>
                      {u.active ? 'Active' : 'Paused'}
                    </button>
                    <button onClick={() => remove(u)} aria-label="Remove" style={{ width: 32, height: 32, borderRadius: 8, cursor: 'pointer',
                      border: '1px solid rgba(255,90,61,.3)', background: 'rgba(255,90,61,.1)', color: '#ff8a72', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg>
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* add form */}
          <div style={{ paddingTop: 4 }}>
            <div style={{ fontSize: 10.5, color: '#7e9384', letterSpacing: '.12em', textTransform: 'uppercase', marginBottom: 8 }}>Add someone</div>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              <input value={chatId} onChange={e => setChatId(e.target.value)} placeholder="Chat ID (e.g. 6327831101)"
                inputMode="numeric" style={{ ...field, flexBasis: '100%' }} onKeyDown={e => { if (e.key === 'Enter') add(); }} />
              <input value={label} onChange={e => setLabel(e.target.value)} placeholder="Name (optional)"
                style={field} onKeyDown={e => { if (e.key === 'Enter') add(); }} />
              <button onClick={add} disabled={busy} style={{ padding: '11px 18px', borderRadius: 11, border: 'none', cursor: busy ? 'default' : 'pointer',
                fontFamily: 'Satoshi', fontWeight: 700, fontSize: 14, color: '#0a1610', opacity: busy ? 0.6 : 1,
                background: 'linear-gradient(135deg,#e8c662,#b8902e)' }}>{busy ? 'Adding…' : 'Add'}</button>
            </div>
            <div style={{ fontSize: 11.5, color: '#7e9384', marginTop: 9, lineHeight: 1.45 }}>
              Have them message <span style={{ fontFamily: 'JetBrains Mono', color: '#9fb0a2' }}>@userinfobot</span> on Telegram to get their chat ID. They get replies to commands only — your daily alerts and digests stay private to you.
            </div>
            {err && <div style={{ fontSize: 12.5, color: '#ff8a72', marginTop: 10, padding: '9px 12px', borderRadius: 10, background: 'rgba(255,90,61,.1)', border: '1px solid rgba(255,90,61,.25)' }}>{err}</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [deals] = useState(() => window.TS_DEALS);
  const [view, setView] = useState('dashboard');
  const [loc, setLocState] = useState(() => localStorage.getItem('ts_loc') || 'oldtown');
  const setLoc = (id) => { setLocState(id); try { localStorage.setItem('ts_loc', id); } catch (e) {} };
  const [open, setOpen] = useState(null);          // deal in detail modal
  const [pings, setPings] = useState([]);          // deals pinged to telegram
  const [pingedIds, setPingedIds] = useState(new Set());
  const [botSeen, setBotSeen] = useState(0);
  const [toast, setToast] = useState(null);
  const [usersOpen, setUsersOpen] = useState(false); // allowlist modal
  const [photoKey, setPhotoKey] = useState(0);     // bump to re-read dropped photos
  const photos = window.useImageSlots(photoKey);

  const ping = (d) => {
    setPings(p => [...p, d]);
    setPingedIds(s => new Set(s).add(d.id));
    setToast(`“${d.product}” sending to Telegram…`);
    fetch('/api/ping', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ deal: d, loc }),
    })
      .then(r => r.json())
      .then(res => {
        if (res.ok) setToast(`“${d.product}” sent to Telegram`);
        else if (res.configured === false) setToast(`Telegram not configured — check .env`);
        else setToast(`Telegram send failed for “${d.product}”`);
      })
      .catch(() => setToast(`Network error sending “${d.product}”`))
      .finally(() => setTimeout(() => setToast(null), 2400));
  };
  const goBot = () => { setView('bot'); setBotSeen(pings.length); };
  const closeDetail = () => { setOpen(null); setPhotoKey(k => k + 1); };
  const unseen = pings.length - botSeen;

  return (
    <div style={{ maxWidth: 1320, margin: '0 auto', padding: '0 clamp(16px,3.5vw,40px)' }}>
      {/* top bar */}
      <header style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16, padding: '20px 0', position: 'sticky', top: 0, zIndex: 40,
        background: 'linear-gradient(180deg, rgba(8,16,11,.92), rgba(8,16,11,.4) 70%, transparent)', backdropFilter: 'blur(6px)', flexWrap: 'wrap' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ width: 38, height: 38, borderRadius: 11, background: 'linear-gradient(135deg,#e8c662,#b8902e)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#0a1610', fontFamily: 'Clash Display', fontWeight: 700, fontSize: 22, boxShadow: '0 0 24px rgba(212,175,55,.4)' }}>T</div>
          <div>
            <div style={{ fontFamily: 'Clash Display', fontWeight: 600, fontSize: 20, letterSpacing: '-.01em', lineHeight: 1 }}>TopShelf</div>
            <div style={{ fontSize: 11, color: '#7e9384', marginTop: 2 }}>Scottsdale · within 7 mi</div>
          </div>
        </div>

        {/* segmented view switch */}
        <div style={{ display: 'flex', gap: 4, background: 'rgba(0,0,0,.35)', padding: 4, borderRadius: 13, border: '1px solid rgba(255,255,255,.07)' }}>
          {[['dashboard', 'Dashboard'], ['bot', 'Telegram bot']].map(([k, l]) => {
            const on = view === k;
            return (
              <button key={k} onClick={() => k === 'bot' ? goBot() : setView('dashboard')} style={{ position: 'relative', display: 'flex', alignItems: 'center', gap: 7,
                padding: '9px 16px', borderRadius: 10, border: 'none', cursor: 'pointer', fontFamily: 'Satoshi', fontWeight: 600, fontSize: 13.5,
                background: on ? 'linear-gradient(135deg,#e8c662,#b8902e)' : 'transparent', color: on ? '#0a1610' : '#cbd8cc', transition: 'all .18s' }}>
                {l}
                {k === 'bot' && unseen > 0 && <span style={{ position: 'absolute', top: 2, right: 2, minWidth: 17, height: 17, padding: '0 4px', borderRadius: 9, background: '#ff5a3d', color: '#fff', fontSize: 10.5, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', animation: 'tsPop .3s' }}>{unseen}</span>}
              </button>
            );
          })}
        </div>

        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginLeft: 'auto' }}>
          <button onClick={() => setUsersOpen(true)} aria-label="Bot allowlist" title="Bot allowlist"
            style={{ width: 40, height: 40, borderRadius: 11, cursor: 'pointer', flexShrink: 0,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              background: 'rgba(0,0,0,.35)', border: '1px solid rgba(255,255,255,.1)', color: '#cbd8cc', transition: 'all .18s' }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          </button>
          <SavingsCounter />
        </div>
      </header>

      {/* body */}
      <main>
        {view === 'dashboard'
          ? <window.Dashboard deals={deals} onOpen={setOpen} onPing={ping} pingedIds={pingedIds} photos={photos} loc={loc} setLoc={setLoc} />
          : <window.TelegramView deals={deals} pings={pings} photos={photos} loc={loc} />}
      </main>

      {open && <window.DealDetail d={open} onClose={closeDetail} onPing={ping} pinged={pingedIds.has(open.id)} loc={loc} />}

      {usersOpen && <AllowlistModal onClose={() => setUsersOpen(false)} />}

      {/* toast */}
      {toast && (
        <div style={{ position: 'fixed', bottom: 26, left: '50%', transform: 'translateX(-50%)', zIndex: 200, display: 'flex', alignItems: 'center', gap: 10,
          padding: '13px 20px', borderRadius: 14, background: 'rgba(12,24,17,.96)', border: '1px solid rgba(94,255,160,.4)',
          boxShadow: '0 20px 50px -16px rgba(0,0,0,.8)', animation: 'tsRise .3s cubic-bezier(.2,.8,.2,1)' }}>
          <span style={{ width: 26, height: 26, borderRadius: 14, background: 'linear-gradient(135deg,#5effa0,#1f8a5b)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#04130b" strokeWidth="2.6"><path d="M20 6L9 17l-5-5"/></svg>
          </span>
          <span style={{ fontSize: 13.5, color: '#eaf2eb' }}>{toast}</span>
          <button onClick={goBot} style={{ marginLeft: 6, padding: '5px 12px', borderRadius: 9, border: '1px solid rgba(94,255,160,.4)', background: 'rgba(94,255,160,.12)', color: '#5effa0', fontSize: 12.5, fontWeight: 700, cursor: 'pointer', fontFamily: 'Satoshi' }}>View →</button>
        </div>
      )}

      <footer style={{ padding: '40px 0 30px', color: '#5a6a5f', fontSize: 12, textAlign: 'center' }}>
        TopShelf · personal deal aggregator · scores update every 3–6 h · all times America/Phoenix
      </footer>
    </div>
  );
}
fetch('/api/bootstrap').then(r => r.json()).then(b => {
  window.TS_DEALS = b.deals; window.TS_CATS = b.cats; window.TS_SHOPS = b.shops;
  window.TS_LOCATIONS = b.locations; window.TS_DIST = b.dist;
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
});
</script>
</body>
</html>
